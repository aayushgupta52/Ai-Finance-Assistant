services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
      POSTGRES_DB: fintrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://fintrack:fintrack@postgres:5432/fintrack?schema=public
      # No connection pooler in the compose stack, so DIRECT_URL == DATABASE_URL
      # (Prisma requires it for `migrate deploy`).
      DIRECT_URL: postgresql://fintrack:fintrack@postgres:5432/fintrack?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      # Persist the WhatsApp (Baileys) login so it survives restarts and you
      # don't have to re-scan the QR. Only used when WHATSAPP_ENABLED=true.
      - wa_auth:/app/auth_info_baileys
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  wa_auth:
