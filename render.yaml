# Render Blueprint — backend web service + free Postgres.
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: fintrack-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate
    # migrate deploy runs the 0_init migration on first boot (idempotent after).
    startCommand: npx prisma migrate deploy && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Postgres connection is injected from the database defined below.
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
      # Auto-generated 64-char secrets — no need to set these manually.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      # Set these yourself in the Render dashboard (sync:false = not in git):
      - key: GROQ_API_KEY
        sync: false
      # Frontend origin — set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: FRONTEND_URL
        sync: false
      # Google OAuth. CALLBACK_URL must go through the Vercel proxy so the
      # refresh cookie lands on the frontend domain:
      #   https://your-app.vercel.app/api/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      # Optional — leave blank to disable that feature (app still boots):
      #   CLOUDINARY_* (falls back to local uploads), SMTP_* (emails logged)
      - key: ADMIN_SECRET_KEY
        sync: false
      # WhatsApp needs a persistent disk + terminal — keep off on Render free.
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: DISABLE_CRON
        value: "false"

databases:
  - name: fintrack-db
    plan: free
